device: cuda

model:
  checkpoint: checkpoints/50_longstream.pt
  strict_load: false
  hf:
    repo_id: null
    filename: null
    revision: null
    local_dir: checkpoints
  longstream_cfg:
    img_size: 518
    patch_size: 14
    embed_dim: 1024
    window_size: 48
    use_role_embedding: false
    enable_scale_token: true
    disable_keyframe_distinction: true
    use_segment_mask: false
    enable_camera_head: false
    freeze: none
    use_rel_pose_head: true
    rel_pose_head_cfg:
      enabled: true
      keyframe_mode: fixed
      keyframe_stride: 8
      reference_source: pred
      detach_reference: false
      trunk_depth: 4
      pose_mode: SE3
      num_heads: 16
      mlp_ratio: 4
      init_values: 0.01
      trans_act: linear
      quat_act: linear
      use_pair_cross_attn: false
      xattn_temperature: 1.0
      use_precat: false
      use_kf_role_embed: false
      kf_role_embed_init_std: 0.02
      fl_act: relu
      use_global_scale: false
      reinit_camera_head: false

inference:
  mode: batch_refresh
  streaming_mode: causal
  window_size: 48
  keyframe_mode: fixed
  keyframe_stride: 8
  refresh: 4
  rel_pose_head_cfg:
    num_iterations: 4

data:
  format: generalizable
  data_roots_file: data_roots.txt
  camera: "00"
  img_path: prepared_inputs/preprocess/final
  seq_list: [zhan_1_1fps]
  stride: 1
  max_frames: null
  size: 518
  crop: false
  patch_size: 14
  gt_source: auto             # camera_yml | npy | auto（优先 cameras/extri.yml，退回 gt_poses.npy）
  gt_poses_file: gt_poses.npy # 相对于 scene_root 的 npy 缓存路径

optimizations:
  # 优化1：输入预筛选
  filter:
    enabled: true
    blur_threshold: 100.0   # 拉普拉斯方差阈值，低于此值视为模糊帧
    motion_threshold: 0.02  # 帧间均值绝对差阈值（0-1归一化），低于此值视为冗余帧
    save_frame_index_map: true  # 推理时保存 frame_index_map.json
  # 优化2：GT位姿校正
  correction:
    enabled: true
    interval: 10            # 每10帧进行一次尺度/位姿校正
    align_mode: "full"      # full (位姿+尺度) 或 scale_only
    use_corrected_pose_for_eval: true  # 评估时优先使用校正后位姿

output:
  root: outputs/zhan_1_1fps
  save_videos: true
  save_points: true
  save_frame_points: true
  save_depth: true
  save_images: true
  mask_sky: true
  max_full_pointcloud_points: 2000000
  max_frame_pointcloud_points: 200000
  skyseg_path: model/skyseg.onnx

evaluation:
  align_scale: true
  depth_rel_delta_threshold: 1.25
  point_f1_threshold: 0.25
  point_eval_max_points: 100000
  point_eval_voxel_size: null
  point_eval_oversample_factor: 4
