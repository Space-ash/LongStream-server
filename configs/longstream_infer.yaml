# =========================
# LongStream reconstruction / point cloud / evaluation config
# Notes:
# - This file contains only reconstruction and evaluation stage settings.
# - Preprocessing, frame selection, and Depth Anything V2 settings live in
#   configs/preprocess.yaml.
# - For ablations, prefer toggling boolean flags such as enabled / save_*.
# =========================

device: cuda

# -------------------------
# Model and weights
# -------------------------
model:
  checkpoint: checkpoints/50_longstream.pt
  strict_load: false

  hf:
    repo_id: null
    filename: null
    revision: null
    local_dir: checkpoints

  longstream_cfg:
    img_size: 518
    patch_size: 14
    embed_dim: 1024
    window_size: 48

    # Optional modules, useful for ablations
    use_role_embedding: false
    enable_scale_token: true
    disable_keyframe_distinction: true
    use_segment_mask: false
    enable_camera_head: false
    use_rel_pose_head: true

    freeze: none            # none | encoder

    rel_pose_head_cfg:
      enabled: true
      keyframe_mode: fixed
      keyframe_stride: 8
      reference_source: pred
      detach_reference: false
      trunk_depth: 4
      pose_mode: SE3
      num_heads: 16
      mlp_ratio: 4
      init_values: 0.01
      trans_act: linear
      quat_act: linear
      use_pair_cross_attn: false
      xattn_temperature: 1.0
      use_precat: false
      use_kf_role_embed: false
      kf_role_embed_init_std: 0.02
      fl_act: relu
      use_global_scale: false
      reinit_camera_head: false

# -------------------------
# Inference / streaming reconstruction
# -------------------------
inference:
  mode: batch_refresh       # batch_refresh | streaming_refresh
  streaming_mode: causal    # causal | window
  window_size: 48
  keyframe_mode: fixed
  keyframe_stride: 8
  refresh: 4

  rel_pose_head_cfg:
    num_iterations: 4

# -------------------------
# Data loading
# -------------------------
data:
  format: generalizable
  data_roots_file: data_roots.txt
  img_path: prepared_inputs/preprocess/final
  seq_list: [zhan_1_1fps]
  camera: "00"

  # Input sizing / truncation
  stride: 1
  max_frames: null
  size: 518
  crop: false
  patch_size: 14

  # GT pose source
  gt_source: auto           # camera_yml | npy | auto
  gt_poses_file: gt_poses.npy

# -------------------------
# Reconstruction-stage optimizations
# -------------------------
optimizations:
  # Input pre-filtering
  filter:
    frame_filter_enabled: true
    confidence_filter_enabled: true
    blur_threshold: 100.0
    motion_threshold: 0.02
    confidence_threshold: 0.5
    save_frame_index_map: true

  # TTO (Test-Time Optimization): calibrate scale_token using GPS displacement
  correction:
    tto_enabled: true
    tto_steps: 20
    tto_lr: 1.0e-3
    tto_weight_decay: 0.0
    tto_window_size: 40
    tto_min_gps_disp: 1.0
    tto_max_grad_norm: 1.0
    tto_pair_stride: 8

# -------------------------
# Output controls
# save_* flags are useful for speed / memory / storage ablations
# -------------------------
output:
  root: outputs/zhan_1_1fps

  save_videos: true
  save_images: true
  save_depth: true
  save_points: true
  save_frame_points: true

  mask_sky: true
  skyseg_path: model/skyseg.onnx

  max_full_pointcloud_points: 2000000
  max_frame_pointcloud_points: 200000

# -------------------------
# Evaluation settings
# -------------------------
evaluation:
  align_scale: true
  depth_rel_delta_threshold: 1.25
  point_f1_threshold: 0.25
  point_eval_max_points: 100000
  point_eval_voxel_size: null
  point_eval_oversample_factor: 4
